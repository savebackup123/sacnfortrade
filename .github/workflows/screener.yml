name: Daily 80/20 SET Stock Screener

on:
  schedule:
    # Run at 18:00 ICT (11:00 UTC) every weekday (Monday - Friday)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Diagnostic Secrets Check
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        import os
        token = os.getenv('TELEGRAM_BOT_TOKEN')
        chat_id = os.getenv('TELEGRAM_CHAT_ID')
        print(f'TELEGRAM_BOT_TOKEN present: {bool(token)}')
        print(f'TELEGRAM_BOT_TOKEN length: {len(token) if token else 0}')
        print(f'TELEGRAM_CHAT_ID present: {bool(chat_id)}')
        print(f'TELEGRAM_CHAT_ID value: {repr(chat_id)}')
        "

    - name: Run Screener Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener_bot.py
